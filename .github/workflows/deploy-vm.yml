name: Deploy To VM

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: "true"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify required secrets are set
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          VM_APP_DIR: ${{ secrets.VM_APP_DIR }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
          VM_PORT: ${{ secrets.VM_PORT }}
        run: |
          missing=0
          check() {
            name="$1"
            val="$2"
            if [ -z "$val" ]; then
              echo "::error::Secret $name is missing or empty. Add it under Settings → Secrets and variables → Actions."
              missing=1
            else
              echo "OK: $name is set (value hidden)"
            fi
          }
          check VM_HOST "$VM_HOST"
          check VM_USER "$VM_USER"
          check VM_SSH_PRIVATE_KEY "$VM_SSH_PRIVATE_KEY"
          check VM_APP_DIR "$VM_APP_DIR"
          if [ -z "$ENV_FILE" ]; then
            echo "::warning::ENV_FILE is empty — CI will not write .env (use a secret or manage .env on the VM)"
          else
            echo "OK: ENV_FILE is set (value hidden)"
          fi
          if [ -z "$VM_PORT" ]; then
            echo "OK: VM_PORT not set — deploy will use default port 22"
          else
            echo "OK: VM_PORT is set (value hidden)"
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ secrets.VM_APP_DIR }}
          BRANCH: ${{ github.ref_name }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script_stop: true
          envs: APP_DIR,BRANCH,ENV_FILE
          script: |
            set -e

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Repository not found at $APP_DIR. Clone it once on VM first."
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"

            npm ci --omit=dev

            if [ -n "$ENV_FILE" ]; then
              printf "%s" "$ENV_FILE" > .env
            fi

            if command -v pm2 >/dev/null 2>&1; then
              if pm2 describe leaderboard >/dev/null 2>&1; then
                pm2 restart leaderboard --update-env
              else
                pm2 start npm --name leaderboard -- run start:prod
              fi
              pm2 save
            else
              pkill -f "node src/index.js" || true
              nohup npm run start:prod > app.log 2>&1 &
            fi
